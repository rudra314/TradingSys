name: "🌅 Morning Check — Mon-Fri 9:30 AM IST"

on:
  schedule:
    # Mon-Fri 09:30 IST = 04:00 UTC
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

concurrency:
  group: nse-scanner
  cancel-in-progress: false

jobs:
  morning-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('momentum-scanner/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r momentum-scanner/requirements.txt

      - name: Run morning breakout check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          cd momentum-scanner
          python run_scan.py morning

      - name: Commit updated positions / breakout state
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "NSE Scanner Bot"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add docs/data/ momentum-scanner/data/
          git diff --staged --quiet || git commit -m "🌅 Morning check — $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push origin ${{ github.ref_name }}
