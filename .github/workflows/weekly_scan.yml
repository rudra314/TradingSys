name: "📊 Weekly Scan — Sunday 6 PM IST"

on:
  schedule:
    # Sunday 18:00 IST = Sunday 12:30 UTC
    - cron: "30 12 * * 0"
  workflow_dispatch:   # Manual trigger from GitHub Actions UI

concurrency:
  group: nse-scanner
  cancel-in-progress: false

jobs:
  weekly-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('momentum-scanner/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r momentum-scanner/requirements.txt

      - name: Verify curl_cffi (Yahoo Finance TLS bypass)
        run: |
          python -c "import curl_cffi; print('curl_cffi version:', curl_cffi.__version__)"
          python -c "import yfinance as yf; t = yf.Ticker('RELIANCE.NS'); h = t.history(period='5d'); print('Test fetch rows:', len(h))"

      - name: Run weekly scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          cd momentum-scanner
          python run_scan.py weekly

      - name: Show scanner log (always)
        if: always()
        run: |
          echo "=== Last 80 lines of scanner.log ==="
          tail -80 momentum-scanner/logs/scanner.log 2>/dev/null || echo "(no log file)"

      - name: Commit scan results to docs/data
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "NSE Scanner Bot"
          git fetch origin main
          git checkout main
          git pull --rebase origin main || true
          git add docs/data/ momentum-scanner/data/
          git diff --staged --quiet || git commit -m "📊 Weekly scan — $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push origin main
